kind = "web"
previewPath = "/"
title = "POSTER"
version = "1.0.0"
id = "artifacts/poster-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25496

[services.development]
run = "pnpm --filter @workspace/poster-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poster-game", "run", "build" ]
publicDir = "artifacts/poster-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25496"
BASE_PATH = "/"
